<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - API Client</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Customers Management</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="customers.html" class="active">Customers</a>
                <a href="user-profiles.html">User Profiles</a>
                <a href="addresses.html">Addresses</a>
            </nav>
        </header>

        <main>
            <section class="controls">
                <button id="addCustomerBtn" class="btn btn-primary">Add New Customer</button>
                <input type="text" id="searchInput" placeholder="Search customers..." class="search-box">
            </section>

            <section id="customerForm" class="form-section hidden">
                <h2>Customer Form</h2>
                <form id="customer-form">
                    <div class="form-group">
                        <label for="customer-id">Customer ID:</label>
                        <input type="text" id="customer-id" readonly>
                    </div>

                    <div class="form-group">
                        <label for="customer-firstName">First Name:</label>
                        <input type="text" id="customer-firstName" required>
                    </div>

                    <div class="form-group">
                        <label for="customer-lastName">Last Name:</label>
                        <input type="text" id="customer-lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="customer-email">Email:</label>
                        <input type="email" id="customer-email" required>
                    </div>

                    <div class="form-group">
                        <label for="customer-address">Address: <span class="required">*</span></label>
                        <select id="customer-address" required>
                            <option value="">-- Select an Address --</option>
                        </select>
                        <small class="help-text">Required: Please select an address</small>
                    </div>

                    <div class="form-group">
                        <label for="customer-profile">User Profile: <span class="optional">(Optional)</span></label>
                        <select id="customer-profile">
                            <option value="">-- No Profile --</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">Save Customer</button>
                        <button type="button" id="cancelFormBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </section>

            <section id="customersList" class="list-section">
                <h2>Customers List</h2>
                <table id="customers-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>City</th>
                            <th>Street</th>
                            <th>Zip Code</th>
                            <th>Nickname</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 API Client. All rights reserved.</p>
        </footer>
    </div>

    <!-- Scripts must be loaded in this order -->
    <script src="../scripts/api-client.js"></script>
    <script src="../scripts/app.js"></script>
</body>
</html>

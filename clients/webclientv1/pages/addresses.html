<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addresses - API Client</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Addresses Management</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="customers.html">Customers</a>
                <a href="user-profiles.html">User Profiles</a>
                <a href="addresses.html" class="active">Addresses</a>
            </nav>
        </header>

        <main>
            <section class="controls">
                <button id="addAddressBtn" class="btn btn-primary">Add New Address</button>
                <input type="text" id="searchInput" placeholder="Search addresses..." class="search-box">
                <select id="filterCountry" class="filter-select">
                    <option value="">All Countries</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="UK">United Kingdom</option>
                    <option value="AU">Australia</option>
                </select>
            </section>

            <section id="addressForm" class="form-section hidden">
                <h2>Address Form</h2>
                <form id="addressFormElement">
                    <div class="form-group">
                        <label for="addressId">Address ID:</label>
                        <input type="text" id="addressId" readonly>
                    </div>
                    <div class="form-group">
                        <label for="customerId">Customer ID:</label>
                        <input type="text" id="customerId" required>
                    </div>
                    <div class="form-group">
                        <label for="addressType">Address Type:</label>
                        <select id="addressType" required>
                            <option value="billing">Billing</option>
                            <option value="shipping">Shipping</option>
                            <option value="home">Home</option>
                            <option value="work">Work</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="streetAddress">Street Address:</label>
                        <input type="text" id="streetAddress" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="form-group">
                        <label for="state">State/Province:</label>
                        <input type="text" id="state">
                    </div>
                    <div class="form-group">
                        <label for="postalCode">Postal Code:</label>
                        <input type="text" id="postalCode" required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country:</label>
                        <input type="text" id="country" required>
                    </div>
                    <div class="form-group">
                        <label for="isDefault">
                            <input type="checkbox" id="isDefault">
                            Set as Default Address
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">Save Address</button>
                        <button type="button" id="cancelFormBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </section>

            <section id="addressesList" class="list-section">
                <h2>Addresses List</h2>
                <div id="addressesContainer" class="data-container">
                    <p class="loading">Loading addresses...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 API Client. All rights reserved.</p>
        </footer>
    </div>

    <script src="../js/api-client.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>

  <!-- Add New Product Promotion Button -->
  <div id="addProductPromotionButtonGroup" class="button-group" style="margin-bottom: 20px;">

      + Add New Product Promotion

  </div>

  <!-- Product Promotion Form (Hidden by Default) -->
  <div id="productPromotionForm" class="form-section hidden" data-auto-generate="true">

  <!-- Product Promotions List -->
  <div class="list-container">
    <!-- Dynamic Filter Row -->
    <div id="product-promotion-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Product Promotions Table -->
    <table id="product-promotions-table">
      <thead>
        <!-- Headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Data rows generated dynamically -->
      </tbody>
    </table>
  </div>
</div>

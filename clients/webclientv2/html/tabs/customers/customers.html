<div id="customers-tab" class="tab-content">
  <!-- Messages and Loading State -->
  <div id="customers-message" class="message"></div>
  <div id="customers-loading" class="loading">Loading customers...</div>

  <!-- Add Customer Button -->
  <div id="addCustomerButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="customersCrudManager.toggleFormVisibility(true);">
      + Add New Customer
    </button>
  </div>

  <!-- Customer Form (Hidden by Default) -->
  <div id="customerForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- Customers List Section -->
  <div class="list-container">    
    <!-- Filter Row -->
    <div id="customer-filter-row-container" class="filter-row">
      <!-- Filter UI will be generated here dynamically -->
    </div>
    <!-- Customers Table -->
    <table id="customers-table">
      <thead>
        <!-- Headers will be generated here dynamically -->
      </thead>
      <tbody>
        <!-- Data rows will be generated here dynamically -->
      </tbody>
    </table>

  </div>
</div>

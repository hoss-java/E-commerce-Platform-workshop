<div id="addresses-tab" class="tab-content">
  <!-- Messages and Loading States -->
  <div id="addresses-message" class="message"></div>
  <div id="addresses-loading" class="loading">Loading addresses...</div>

  <!-- Add New Address Button -->
  <div id="addAddressButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="addressesCrudManager.toggleFormVisibility(true);">
      + Add New Address
    </button>
  </div>


  <!-- Address Form (Hidden by Default) -->
  <div id="addressForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- Addresses List -->
  <div class="list-container">
    <!-- Dynamic Filter Row -->
    <div id="address-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Addresses Table -->
    <table id="addresses-table">
      <thead>
        <!-- Headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Data rows generated dynamically -->
      </tbody>
    </table>
  </div>
</div>

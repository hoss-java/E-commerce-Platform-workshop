<div id="user-profiles-tab" class="tab-content">
  <!-- Messages and Loading States -->
  <div id="user-profiles-message" class="message"></div>
  <div id="user-profiles-loading" class="loading">Loading user profiles...</div>

  <!-- Add Button Section -->
  <div id="addUserProfileButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="userProfilesCrudManager.toggleFormVisibility(true);">
      + Add New Profile
    </button>
  </div>

  <!-- User Profile Form (Hidden by Default) -->
  <div id="userProfileForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- List Container -->
  <div class="list-container">    
    <!-- Filter Row -->
    <div id="user-profile-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Data Table -->
    <table id="user-profiles-table">
      <thead>
        <!-- Table headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Table rows generated dynamically -->
      </tbody>
    </table>

  </div>
</div>

<div id="orders-tab" class="tab-content">
  <!-- Messages and Loading States -->
  <div id="orders-message" class="message"></div>
  <div id="orders-loading" class="loading">Loading orders...</div>

  <!-- Add New Orders Button -->
  <div id="addOrderButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="ordersCrudManager.toggleFormVisibility(true);">
      + Add New Order
    </button>
  </div>

  <!-- Order Form (Hidden by Default) -->
  <div id="orderForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- Orders List -->
  <div class="list-container">
    <!-- Dynamic Filter Row -->
    <div id="order-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Orders Table -->
    <table id="orders-table">
      <thead>
        <!-- Headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Data rows generated dynamically -->
      </tbody>
    </table>
  </div>
</div>

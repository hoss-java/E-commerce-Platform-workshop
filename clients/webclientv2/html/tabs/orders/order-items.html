<div id="order-items-tab" class="tab-content">
  <!-- Messages and Loading States -->
  <div id="order-items-message" class="message"></div>
  <div id="order-items-loading" class="loading">Loading order items...</div>

  <!-- Add New Order Items Button -->
  <div id="addOrderItemButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="orderItemsCrudManager.toggleFormVisibility(true);">
      + Add New Order Item
    </button>
  </div>

  <!-- Order Item Form (Hidden by Default) -->
  <div id="orderItemForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- Order Items List -->
  <div class="list-container">
    <!-- Dynamic Filter Row -->
    <div id="order-item-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Order Items Table -->
    <table id="order-items-table">
      <thead>
        <!-- Headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Data rows generated dynamically -->
      </tbody>
    </table>
  </div>
</div>

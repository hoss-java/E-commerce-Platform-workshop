<div id="categories-tab" class="tab-content">
  <!-- Messages and Loading States -->
  <div id="categories-message" class="message"></div>
  <div id="categories-loading" class="loading">Loading categories...</div>

  <!-- Add New Categories Button -->
  <div id="addCategoryButtonGroup" class="button-group" style="margin-bottom: 20px;">
    <button class="btn-primary" onclick="categoriesCrudManager.toggleFormVisibility(true);">
      + Add New Category
    </button>
  </div>


  <!-- Category Form (Hidden by Default) -->
  <div id="categoryForm" class="form-section hidden" data-auto-generate="true">
    <!-- Form will be generated here -->
  </div>

  <!-- Categories List -->
  <div class="list-container">
    <!-- Dynamic Filter Row -->
    <div id="category-filter-row-container" class="filter-row">
      <!-- Filter UI generated dynamically -->
    </div>
    <!-- Categories Table -->
    <table id="categories-table">
      <thead>
        <!-- Headers generated dynamically -->
      </thead>
      <tbody>
        <!-- Data rows generated dynamically -->
      </tbody>
    </table>
  </div>
</div>
